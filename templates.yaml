# --- Modern Sensors (State-Based) ---
- sensor:
    - name: "Washer Time Display"
      unique_id: washer_time_display_legacy
      # This ensures the entity ID remains sensor.washer_time_display
      default_entity_id: sensor.washer_time_display
      state: >
        {% if is_state('sensor.front_load_washer_run_state', '-') %}
          unknown
        {% elif is_state('sensor.front_load_washer_run_state', 'Standby') %}
          -:--
        {% else %}
          {{ state_attr('sensor.front_load_washer', 'remain_time') }}
        {% endif %}

    - name: "Dryer Time Display"
      unique_id: dryer_time_display_legacy
      default_entity_id: sensor.dryer_time_display
      state: >
        {% if is_state('sensor.dryer_run_state', '-') %}
          unknown
        {% elif is_state('sensor.dryer_run_state', 'Standby') %}
          -:--
        {% else %}
          {{ state_attr('sensor.dryer', 'remain_time') }}
        {% endif %}

    - name: "Dish Washer Time Display"
      unique_id: dishwasher_time_display_legacy
      default_entity_id: sensor.dishwasher_time_display
      state: >
        {% if is_state('input_boolean.dishwasher_on', 'off') %}
          off
        {% else %}
          {% set f = state_attr('timer.dishwasher_timer', 'finishes_at') %}
          {{ '00:00' if f == None else
          (as_datetime(f) - now()).total_seconds() | timestamp_custom('%H:%M', false) }}
        {% endif %}

    - name: "Blank Sensor"
      unique_id: blank_sensor_legacy
      default_entity_id: sensor.blank
      state: ""
- switch:
    - name: "Office AC"
      unique_id: office_ac_switch_modern
      state: "{{ not is_state('climate.gemodulec9cd_window_ac', 'off') }}"
      turn_on:
        - action: climate.set_hvac_mode
          data: { hvac_mode: cool }
          target: { entity_id: climate.gemodulec9cd_window_ac }
      turn_off:
        - action: climate.set_hvac_mode
          data: { hvac_mode: "off" }
          target: { entity_id: climate.gemodulec9cd_window_ac }
# --- Modern Binary Sensors (State-Based) ---
- binary_sensor:
    - name: "Washer Door Lock"
      unique_id: washer_door_lock_legacy
      default_entity_id: binary_sensor.washer_door_lock
      device_class: lock
      state: "{{ state_attr('sensor.front_load_washer','door_lock') }}"

    - name: "Alexa HA - Fireplace Lamp"
      unique_id: alexa_ha_fireplace_lamp_legacy
      default_entity_id: binary_sensor.alexa_ha_fireplace
      device_class: garage_door
      state: "{{ is_state('input_boolean.home_assistant_fireplace', 'on') }}"
# SpotifyPlus Search Media Template Sensor
- trigger:
    - platform: state
      entity_id: input_text.spotifyplus_search_media_text
  action:
    - action: system_log.write
      data:
        level: info
        logger: my_templates_automation
        message: "Automation triggered: Update spotifyplus_search_media_result"
    - action: media_player.search_media
      data:
        entity_id: media_player.spotifyplus_matthew_madonna
        search_query: "{{ states('input_text.spotifyplus_search_media_text') }}"
        media_filter_classes:
          - album
          - artist
          - track
      response_variable: service_response
  sensor:
    - name: spotifyplus_search_media_result
      unique_id: spotifyplus_search_media_result
      state: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      attributes:
        query: "{{ states('input_text.spotifyplus_search_media_text') }}"
        foundItems: >
          {% set first_key = service_response.keys() | list | first %}
          {% set ns = namespace(foundItems=[]) %}
          {%- for item in service_response[first_key]['result'] -%}
            {%- set title = item['title'] | default('') -%}
            {%- set thumbnail = item['thumbnail'] | default('') -%}
            {%- set media_content_id = item['media_content_id'] | default('') -%}
            {%- set media_content_type = item['media_content_type'] | default('') -%}
            {%- set media_class = item['media_class'] | default('') -%}
            {%- set foundItem = {'title': title, 'type': media_content_type, 'uri': media_content_id, 'image': thumbnail} -%}
            {%- set ns.foundItems = ns.foundItems + [foundItem]  -%}
          {%- endfor -%}
          {{ ns.foundItems }}

# Favorite Albums
- trigger:
    - platform: event
      event_type: "spotifyplus_service_response"
      event_data:
        service: "get_album_favorites"
  sensor:
    - name: "SpotifyPlus Favorite Albums"
      unique_id: spotifyplus_favorite_albums_sensor
      icon: mdi:album
      state: "{{ trigger.event.data.response_data.items | count if trigger.event.data.response_data.items is defined else 0 }}"
      attributes:
        items: "{{ trigger.event.data.response_data.items if trigger.event.data.response_data.items is defined else [] }}"

