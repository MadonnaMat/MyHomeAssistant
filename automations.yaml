  triggers:
  - event_type: esphome.keypad_auth_request
    trigger: event
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.pin_hash == ''43c51fc6a73717519e5b4ae73f363abeef0aa2e2268c88ca90575204ad26a2b2''
          }}'
      sequence:
      - action: esphome.test_esp32c_auth_success
        data: {}
      - action: input_number.set_value
        metadata: {}
        target:
          entity_id: input_number.test_esp32c_failed_attempts
        data:
          value: 0
    default:
    - action: esphome.test_esp32c_auth_fail
      data: {}
    - action: input_number.increment
      metadata: {}
      target:
        entity_id: input_number.test_esp32c_failed_attempts
      data: {}
