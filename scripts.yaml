alarm_sound:
  sequence:
  - if:
    - condition: not
      conditions:
      - condition: state
        entity_id: media_player.spotify_matthew_madonna
        state: unavailable
    then:
    - wait_for_trigger:
      - trigger: state
        entity_id:
        - media_player.spotify_matthew_madonna
        from: unavailable
        to:
      timeout:
        hours: 0
        minutes: 10
        seconds: 0
        milliseconds: 0
  - action: media_player.select_source
    data:
      source: Matthew's 2nd Echo Show
    target:
      device_id: 03da9a068eb4ac915a6ee3b89f259622
  - delay:
      hours: 0
      minutes: 0
      seconds: 2
      milliseconds: 0
  - action: media_player.volume_set
    metadata: {}
    data:
      volume_level: 1
    target:
      device_id: 03da9a068eb4ac915a6ee3b89f259622
  - action: media_player.play_media
    metadata: {}
    data:
      media:
        media_content_id: spotify:track:67euHrPxIzKpzpSRLeIKhU
        media_content_type: spotify://track
        metadata:
          title: Alarm
          thumbnail: https://i.scdn.co/image/ab67616d0000b2736611e7da31f9abd3587dfafe
          media_class: track
          children_media_class:
          navigateIds:
          - {}
          - media_content_type: spotify://current_user_recently_played
            media_content_id: current_user_recently_played
          browse_entity_id: media_player.spotify_matthew_madonna
    target:
      device_id: 03da9a068eb4ac915a6ee3b89f259622
  alias: Alarm Sound
  description: ''
